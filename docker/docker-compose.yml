# =============================================================
# docker-compose.yml — Infrastructure Kafka pour Couche 1
# used to define and manage multi-container Docker applications
# 3 containers : zookeeper -> kafka broker -> kafka ui
# =============================================================

# Defines all containers (services) that will run together
services:
  # -----------------------------------------------------------
  # ZOOKEEPER — Coordinateur du cluster Kafka
  # -----------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0 # hadhi el image elli npulliwha
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181 # This defines the port inside the Zookeeper container
      ZOOKEEPER_TICK_TIME: 2000 # Intervalle de heartbeat (ms) : It’s the basic time unit Zookeeper uses for checking if a server is alive or not. If a server doesn’t send a heartbeat within this time, it’s considered dead.
    ports:
      - "2181:2181" # HOST_PORT : CONTAINER_PORT
    healthcheck: #“How do I know if this container is healthy or not?”
      test: ["CMD", "nc", "-z", "localhost", "2181"] # this command is executed inside the container !!! Check if port 2181 is open inside the container
      interval: 10s #test is run every 10 seconds
      timeout: 5s #Each test must finish within 5 seconds
      retries: 5 #retry 5 times before marking container as unhealthy

  # -----------------------------------------------------------
  # The Kafka container = one Kafka broker
  # -----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1 # Unique identifier of the broker
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181 #Tells Kafka where Zookeeper is container_name:internal_port
      # 👉 A listener = a network entry point of a broker where client can connect
      # PLAINTEXT_HOST → accessible depuis ta machine (localhost:9092)
      # PLAINTEXT      → accessible depuis l'intérieur du réseau Docker used by other containers like kafka ui
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT #Defines security protocol for each listener : no encryption/authentication
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT #Which network interface (listener) should brokers use to talk to each other?
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1 # 1 seul broker en dev ; no replication of the internal topic that Kafka uses to store consumer offsets (last processed offset for each consumer )
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true" # Crée les topics automatiquement
      KAFKA_LOG_RETENTION_HOURS: 24 # Garde les messages 24h
    healthcheck:
      test: [
          "CMD",
          "kafka-topics", #kafka-topics : This is a Kafka CLI tool used to manage topics.
          "--bootstrap-server",
          "localhost:9092", # “Connect to the Kafka broker running inside this container”
          "--list",
        ] # => show all topics in the cluster. If this command succeeds, it means the broker is up and running.
      interval: 15s
      timeout: 10s
      retries: 10

  # -----------------------------------------------------------
  # KAFKA-UI — Interface web pour visualiser les topics/messages
  # Accessible sur http://localhost:8080
  # -----------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster #This is just a label (name) for your Kafka cluster in the UI.
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092 #my brokers

  # -----------------------------------------------------------
  # PostgreSQL — Batch analytics output store
  # -----------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spotify_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-spotify_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spotify_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../storage/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spotify_user} -d ${POSTGRES_DB:-spotify_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -----------------------------------------------------------
  # SPARK MASTER — Batch processing coordinator
  # -----------------------------------------------------------
  spark-master:
    build:
      context: ..
      dockerfile: docker/spark/Dockerfile
    image: spotify-spark:3.5.1
    container_name: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master", "--port", "7077", "--webui-port", "8080"]
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ..:/opt/pipeline
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # -----------------------------------------------------------
  # SPARK WORKER — Executes batch tasks
  # -----------------------------------------------------------
  spark-worker:
    image: spotify-spark:3.5.1
    container_name: spark-worker
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "--cores", "4", "--memory", "4G", "--webui-port", "8081", "spark://spark-master:7077"]
    ports:
      - "8082:8081"
    volumes:
      - ..:/opt/pipeline
    depends_on:
      - spark-master

  # -----------------------------------------------------------
  # CASSANDRA — Streaming analytics output store
  # -----------------------------------------------------------
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=SpotifyCluster
    volumes:
      - cassandra-data:/var/lib/cassandra
      - ../storage/cassandra/init.cql:/docker-entrypoint-initdb.d/init.cql
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -u cassandra -p cassandra -e 'describe keyspaces'"]
      interval: 15s
      timeout: 10s
      retries: 10

  # -----------------------------------------------------------
  # CASSANDRA INIT — Initializes schema
  # -----------------------------------------------------------
  cassandra-init:
    image: cassandra:4.1
    container_name: cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ../storage/cassandra/init.cql:/init.cql
    command: /bin/bash -c "cqlsh cassandra -f /init.cql"

volumes:
  postgres-data:
  cassandra-data:
